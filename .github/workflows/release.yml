name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.5.0)'
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-agent:
    name: Build agent (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive: tar.gz
          - rid: win-x64
            archive: zip
          - rid: osx-x64
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish agent (${{ matrix.rid }})
        run: |
          dotnet publish src/CortexPlexus.Agent \
            -c Release \
            -r ${{ matrix.rid }} \
            --no-self-contained \
            -o publish/agent/${{ matrix.rid }}

      - name: Package agent
        run: |
          cd publish/agent
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf cortexplexus-agent-${{ matrix.rid }}.tar.gz ${{ matrix.rid }}
          else
            zip -r cortexplexus-agent-${{ matrix.rid }}.zip ${{ matrix.rid }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.rid }}
          path: publish/agent/cortexplexus-agent-${{ matrix.rid }}.*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-agent
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: agent-*
          merge-multiple: true

      - name: Compute SHA256 checksums
        run: |
          cd artifacts
          sha256sum cortexplexus-agent-*.* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/cortexplexus-agent-*.tar.gz
            artifacts/cortexplexus-agent-*.zip
            artifacts/SHA256SUMS.txt
