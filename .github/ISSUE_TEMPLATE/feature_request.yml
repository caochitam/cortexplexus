name: Feature request
description: Suggest a new feature, MCP tool, or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the **use case** before the implementation —
        "I want to know which tests cover a controller" is more useful than "add a new MCP tool called `GetTestCoverage`".

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case from a developer / AI agent perspective.
      placeholder: |
        As an AI agent investigating bug X, I want to know which tests already exercise the
        affected production code so I can update them in the same PR.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How might CortexPlexus expose this? (MCP tool, query parameter, new edge type, etc.)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds are you using today? Why aren't they good enough?

  - type: textarea
    id: language
    attributes:
      label: Languages affected
      description: Is this specific to a language (C# / TypeScript / Python / etc.) or universal?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to similar features in other tools, screenshots, mockups, etc.
