# CortexPlexus — 2 containers, nothing more
# Usage: docker compose up -d
#
# Images are pre-built and published to GitHub Container Registry.
# No source code or build tools needed — just this file + .env.

services:
  postgres:
    image: ghcr.io/dt-tuan/cortexplexus-postgres:latest
    # To build from source instead: comment out 'image' and uncomment 'build':
    # build:
    #   context: ./docker/postgres
    #   dockerfile: Dockerfile
    environment:
      POSTGRES_DB: cortexplexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cortexplexus
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  cortexplexus:
    image: ghcr.io/dt-tuan/cortexplexus:latest
    # To build from source instead: comment out 'image' and uncomment 'build':
    # build:
    #   context: .
    #   dockerfile: src/CortexPlexus.App/Dockerfile
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=cortexplexus;Username=postgres;Password=cortexplexus
      - Embedding__Provider=${EMBEDDING_PROVIDER:-ollama}
      - Embedding__ApiKey=${GEMINI_API_KEY:-}
      - Embedding__OllamaBaseUrl=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - Workspace__Path=/workspace
    volumes:
      - ${WORKSPACE_PATH:-.}:/workspace
      - appdata:/app/data
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  appdata:
