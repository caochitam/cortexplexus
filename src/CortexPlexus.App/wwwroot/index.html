<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CortexPlexus - Graph Explorer</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <header id="toolbar">
        <div class="toolbar-left">
            <h1>CortexPlexus</h1>
            <select id="repo-select">
                <option value="">Select repository...</option>
            </select>
        </div>
        <div class="toolbar-center">
            <input type="text" id="search-input" placeholder="Search symbols..." />
            <button id="search-btn">Search</button>
        </div>
        <div class="toolbar-right">
            <div id="kind-filters"></div>
            <button id="fit-btn" title="Fit graph to screen">Fit</button>
        </div>
    </header>

    <main id="workspace">
        <div id="cy"></div>
        <aside id="sidebar">
            <div id="sidebar-empty">
                <p>Select a repository to visualize its code graph.</p>
                <p>Click on a node to see details.</p>
            </div>
            <div id="sidebar-detail" class="hidden">
                <h3 id="detail-name"></h3>
                <div class="detail-row"><span class="label">Kind</span><span id="detail-kind" class="badge"></span></div>
                <div class="detail-row"><span class="label">FQN</span><span id="detail-fqn" class="mono"></span></div>
                <div class="detail-row"><span class="label">File</span><span id="detail-file" class="mono"></span></div>
                <div class="detail-row"><span class="label">Line</span><span id="detail-line"></span></div>
                <div class="detail-row"><span class="label">Signature</span><span id="detail-sig" class="mono"></span></div>
                <div class="detail-actions">
                    <button id="expand-btn">Expand Neighbors</button>
                    <button id="focus-btn">Focus</button>
                </div>
                <h4>Connections</h4>
                <ul id="detail-edges"></ul>
            </div>
        </aside>
    </main>

    <div id="legend">
        <span class="legend-item"><span class="dot" style="background:#4A90D9"></span>Class</span>
        <span class="legend-item"><span class="dot" style="background:#50C878"></span>Method</span>
        <span class="legend-item"><span class="dot" style="background:#9B59B6"></span>Interface</span>
        <span class="legend-item"><span class="dot" style="background:#E67E22"></span>Property</span>
        <span class="legend-item"><span class="dot" style="background:#95A5A6"></span>Namespace</span>
        <span class="legend-item"><span class="dot" style="background:#1ABC9C"></span>API Endpoint</span>
        <span class="legend-item"><span class="dot" style="background:#F39C12"></span>DI Registration</span>
    </div>

    <div id="stats-bar">
        <span id="stats-text">Nodes: 0 | Edges: 0</span>
    </div>

    <script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
